<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS 掃碼提案系統 v2.1</title>
    <!-- 使用 Tailwind CSS 快速構建 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 HTML5-QRCode 掃描庫 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #reader { width: 100%; max-width: 500px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <!-- 頂部導航欄 -->
    <nav class="bg-blue-600 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-lg font-bold">提案單系統 v2.1</h1>
            <div class="flex gap-4 text-sm">
                <button onclick="switchTab('scan')" id="tab-scan" class="font-semibold border-b-2 border-white pb-1">掃描提交</button>
                <button onclick="switchTab('history')" id="tab-history" class="opacity-70 hover:opacity-100 pb-1">查詢歷史</button>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4">
        
        <!-- Tab 1: 掃描與提交 -->
        <section id="content-scan" class="tab-content active space-y-6">
            <!-- 相機掃描區 -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <div id="reader" class="overflow-hidden rounded-lg"></div>
                <div id="scan-status" class="text-center text-sm text-gray-500 mt-2 italic">等待相機啟動...</div>
            </div>

            <!-- 提案草稿單 -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-gray-700">目前提案項目</h2>
                    <span id="total-qty" class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-mono">總數: 0</span>
                </div>
                
                <div id="proposal-list" class="space-y-2 max-h-64 overflow-y-auto mb-4">
                    <!-- 項目將由 app.js 動態插入 -->
                    <p class="text-center text-gray-400 py-4 text-sm">尚未掃描任何項目</p>
                </div>

                <!-- 提案基本資訊 -->
                <div class="grid grid-cols-1 gap-3 border-t pt-4">
                    <input type="text" id="proposal-title" placeholder="輸入提案單標題 (必填)" 
                           class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <button onclick="submitProposal()" id="btn-submit" 
                            class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors disabled:bg-gray-300">
                        提交提案單
                    </button>
                </div>
            </div>
        </section>

        <!-- Tab 2: 歷史查詢 -->
        <section id="content-history" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="search-query" placeholder="輸入日期 (例如: 20260517)" 
                           class="flex-1 px-3 py-2 border rounded-lg text-sm outline-none">
                    <button onclick="searchHistory()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">查詢</button>
                </div>
                <div id="history-results" class="space-y-3">
                    <p class="text-center text-gray-400 py-4 text-sm">請輸入日期進行查詢</p>
                </div>
            </div>
        </section>

    </main>

    <!-- 簡單的通知 Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-sm opacity-0 transition-opacity pointer-events-none z-50">
        通知訊息
    </div>

    <script src="app.js"></script>
</body>
</html>
