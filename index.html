<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proposal UI</title>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family:sans-serif; margin:0; padding:12px; }
    .panel { border:1px solid #ddd; padding:12px; margin-bottom:12px; border-radius:8px;}
    button { margin:4px; }
    .item { border:1px solid #ccc; padding:8px; margin-top:8px; border-radius:6px;}
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; justify-content:center; }
    .modal-box { background:#fff; margin-top:40px; padding:16px; width:90%; max-width:400px; }
  </style>
</head>

<body>
<div id="app">

  <!-- Scanner -->
  <div class="panel">
    <h3>Scanner</h3>
    <button @click="startScanner" :disabled="scannerRunning">Start</button>
    <button @click="stopScanner" :disabled="!scannerRunning">Stop</button>
    <div id="reader"></div>
    <p>{{scannerMsg}}</p>
  </div>

  <!-- Manual Input -->
  <div class="panel">
    <h3>Input</h3>
    <input v-model="query" placeholder="barcode / name" @keydown.enter="handleManual">
    <input type="number" v-model.number="qty" min="1">
    <button @click="handleManual">加入</button>
    <p>{{message}}</p>
  </div>

  <!-- Draft -->
  <div class="panel">
    <h3>Draft</h3>
    <div v-for="i in draft.items" :key="i.itemId" class="item">
      <div>{{i.name}} ({{i.barcode}})</div>
      <input type="number" v-model.number="i.qty" @change="changeQty(i)">
      <button @click="remove(i.itemId)">刪除</button>
    </div>
  </div>

  <!-- Submit -->
  <div class="panel">
    <button @click="submit">送出</button>
  </div>

  <!-- Modal -->
  <div v-if="showPicker" class="modal" @click.self="closePicker">
    <div class="modal-box">
      <h3>選擇商品</h3>
      <div v-for="c in choices" :key="c.itemId" @click="selectChoice(c)">
        {{c.name}} - {{c.barcode}}
      </div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
