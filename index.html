<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>掃碼需求提案單 v5</title><script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" defer></script><style>
:root{--bg:#f6f8fb;--card:#fff;--ink:#111827;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--green:#047857;--red:#dc2626;--amber:#92400e}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-size:18px}main{width:min(100%,920px);margin:auto;padding:14px}.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px #0f172a10}h1{margin:0 0 10px}h2{margin:0 0 12px}label{display:block;font-weight:800;margin-bottom:10px}input{width:100%;margin-top:6px;padding:12px;border:1px solid #cbd5e1;border-radius:12px;font-size:18px}button{min-height:46px;border:0;border-radius:12px;background:var(--blue);color:white;font-weight:900;font-size:17px;padding:10px 16px}.ghost{background:#eef2ff;color:#1e40af}.secondary{background:#475569}.danger{background:var(--red)}button:disabled{background:#94a3b8}.tabs,.button-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}.tab-btn{background:#e0e7ff;color:#1e40af}.tab-btn.active{background:var(--blue);color:white}.row,.search-row{display:grid;grid-template-columns:1fr 120px auto;gap:10px;align-items:end}.search-row{grid-template-columns:1fr auto auto}.status{min-height:28px;margin:10px 0 0;font-weight:800;color:var(--green);word-break:break-word}.status.error{color:var(--red)}.status.warn{color:var(--amber)}.muted{color:var(--muted);font-size:15px}.diagnostic{margin-top:8px;padding:10px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:12px;color:var(--muted);font-size:14px;white-space:pre-wrap}.reader-wrap{display:none;margin-top:12px;border-radius:16px;overflow:hidden;background:#000;border:1px solid var(--line);min-height:320px}.reader-wrap.active{display:block}#reader{width:100%;min-height:320px}.item-card,.choice-card,.doc-card{border:1px solid var(--line);border-radius:14px;background:#fff;margin-top:10px;padding:12px}.item-card{display:grid;grid-template-columns:1fr 110px auto;gap:10px}.choice-card,.doc-card{cursor:pointer}.item-name,.doc-title{font-size:19px;font-weight:900}.badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.badge{border-radius:999px;background:#eff6ff;color:#1e40af;font-size:15px;font-weight:800;padding:4px 10px}.doc-main{display:flex;justify-content:space-between;gap:12px}.detail-item{display:grid;grid-template-columns:1fr auto;gap:10px;border-bottom:1px solid var(--line);padding:10px 0}.modal-backdrop{position:fixed;inset:0;z-index:999;background:#0f172a88;display:flex;align-items:flex-start;justify-content:center;padding:24px 12px}.modal-panel{width:min(100%,680px);max-height:88vh;overflow:auto;background:white;border-radius:20px;padding:16px}.modal-header{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:10px}.hidden{display:none!important}@media(max-width:640px){.row,.search-row{grid-template-columns:1fr}.button-row button,.row button,.search-row button{width:100%}.item-card{grid-template-columns:1fr}}
</style></head><body><main><section class="panel"><h1>掃碼需求提案單 v5</h1><p class="muted">歷史查詢已限定使用日期。</p><nav class="tabs"><button id="tab-proposal" class="tab-btn active">需求提案單</button><button id="tab-history" class="tab-btn">歷史單據查詢</button></nav></section>
<section id="page-proposal"><section class="panel"><h2>提案基本資料</h2><label>提案標題<input id="proposal-title" placeholder="例：門市補貨 / 採購需求"></label><label>提案來源<input id="proposal-source" value="GitHub Pages"></label></section><section class="panel"><h2>Scanner</h2><div class="button-row"><button id="btn-start">啟動相機</button><button id="btn-stop" class="secondary" disabled>停止相機</button><button id="btn-sync" class="ghost">同步主檔</button><button id="btn-cameras" class="ghost">檢查相機</button></div><p id="scanner-status" class="status warn">相機尚未啟動</p><div id="camera-diagnostic" class="diagnostic">尚未檢查相機。</div><div id="reader-wrap" class="reader-wrap"><div id="reader"></div></div></section><section class="panel"><h2>手動加入</h2><div class="row"><label>條碼 / 品名 / 品項ID<input id="manual-query" type="search" placeholder="輸入條碼或品名關鍵字"></label><label>數量<input id="manual-qty" type="number" min="1" value="1"></label><button id="btn-add">查詢 / 加入</button></div><p id="message" class="status"></p></section><section class="panel"><div style="display:flex;justify-content:space-between;gap:10px"><h2>草稿品項</h2><span id="total-badge" class="badge">品項 0｜總數 0</span></div><div id="draft-list"></div><div class="button-row"><button id="btn-submit">送出提案</button><button id="btn-clear" class="secondary">清空草稿</button></div></section></section>
<section id="page-history" class="hidden"><section class="panel"><h2>歷史單據查詢</h2><p class="muted">後端以日期字串查 createdAt；本頁固定送出 YYYY-MM-DD。</p><div class="search-row"><label>單據日期<input id="history-date" type="date"></label><button id="btn-history-search">查詢此日期</button><button id="btn-history-today" class="ghost">今日單據</button></div><p id="history-message" class="status"></p><div id="history-results"></div></section></section></main>
<div id="picker" class="modal-backdrop hidden"><section class="modal-panel"><div class="modal-header"><h2>選擇商品</h2><button id="btn-close-picker" class="ghost">關閉</button></div><div id="choice-list"></div></section></div><div id="detail-modal" class="modal-backdrop hidden"><section class="modal-panel"><div class="modal-header"><div><h2 id="detail-doc-id">單據明細</h2><p id="detail-summary" class="muted"></p></div><button id="btn-close-detail" class="ghost">關閉</button></div><div id="detail-items"></div></section></div><script src="app.js?v=20260517-date-history-v5"></script></body></html>
