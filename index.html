<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>掃碼需求提案單 v6</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" defer></script>
<style>
:root{--bg:#f6f8fb;--card:#fff;--ink:#111827;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--blue2:#1d4ed8;--green:#047857;--red:#dc2626;--amber:#92400e}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-size:18px;line-height:1.5}main{width:min(100%,920px);margin:auto;padding:14px}.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px #0f172a10}h1{margin:0 0 10px;font-size:28px}h2{margin:0 0 12px;font-size:22px}label{display:block;font-weight:800;margin-bottom:10px}input{width:100%;margin-top:6px;padding:12px;border:1px solid #cbd5e1;border-radius:12px;font-size:18px;color:var(--ink)}button{min-height:46px;border:0;border-radius:12px;background:var(--blue);color:#fff;font-weight:900;font-size:17px;padding:10px 16px;cursor:pointer;touch-action:manipulation}button:active{background:var(--blue2);transform:translateY(1px)}button:disabled{background:#94a3b8;cursor:not-allowed}.ghost{background:#eef2ff;color:#1e40af}.secondary{background:#475569}.danger{background:var(--red)}.tabs,.button-row,.advanced-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}.tab-btn{background:#e0e7ff;color:#1e40af}.tab-btn.active{background:var(--blue);color:#fff}.row,.search-row{display:grid;grid-template-columns:1fr 120px auto;gap:10px;align-items:end}.search-row{grid-template-columns:1fr auto auto}.status{min-height:28px;margin:10px 0 0;font-weight:800;color:var(--green);word-break:break-word}.status.error{color:var(--red)}.status.warn{color:var(--amber)}.muted{color:var(--muted);font-size:15px}.system-strip{padding:10px 12px;background:#f8fafc;border:1px solid var(--line);border-radius:14px}.diagnostic{margin-top:8px;padding:10px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:12px;color:var(--muted);font-size:14px;white-space:pre-wrap;word-break:break-word}.camera-panel.compact{padding-bottom:12px}.reader-wrap{display:none;margin-top:12px;border-radius:16px;overflow:hidden;background:#000;border:1px solid var(--line);min-height:320px}.reader-wrap.active{display:block}#reader{width:100%;min-height:320px}#reader video{width:100%!important;height:auto!important;min-height:280px;object-fit:cover}.scanner-result{margin-top:10px;padding:10px 12px;border-radius:14px;background:#f8fafc;border:1px solid var(--line)}.item-card,.choice-card,.doc-card{border:1px solid var(--line);border-radius:14px;background:#fff;margin-top:10px;padding:12px}.item-card{display:grid;grid-template-columns:1fr 110px auto;gap:10px}.choice-card,.doc-card{cursor:pointer}.choice-card:hover,.doc-card:hover{border-color:var(--blue)}.item-name,.doc-title{font-size:19px;font-weight:900}.badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.badge{border-radius:999px;background:#eff6ff;color:#1e40af;font-size:15px;font-weight:800;padding:4px 10px}.doc-main{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.detail-item{display:grid;grid-template-columns:1fr auto;gap:10px;border-bottom:1px solid var(--line);padding:10px 0}.modal-backdrop{position:fixed;inset:0;z-index:999;background:#0f172a88;display:flex;align-items:flex-start;justify-content:center;padding:24px 12px}.modal-panel{width:min(100%,680px);max-height:88vh;overflow:auto;background:#fff;border-radius:20px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.25)}.modal-header{display:flex;justify-content:space-between;gap:12px;align-items:start;border-bottom:1px solid var(--line);padding-bottom:10px}.hidden{display:none!important}@media(max-width:640px){main{padding:10px}.row,.search-row{grid-template-columns:1fr}.button-row button,.advanced-row button,.row button,.search-row button{width:100%}.item-card{grid-template-columns:1fr}input,button{font-size:19px}#reader{min-height:360px}#reader video{min-height:330px}.doc-main{display:block}}
</style>
</head>
<body>
<main>
<section class="panel">
  <h1>掃碼需求提案單 v6</h1>
  <p class="muted">單號為唯一追蹤依據；提案標題可選填。歷史查詢限定使用日期。</p>
  <nav class="tabs" aria-label="主功能分頁">
    <button id="tab-proposal" class="tab-btn active" type="button">需求提案單</button>
    <button id="tab-history" class="tab-btn" type="button">歷史單據查詢</button>
  </nav>
  <div class="system-strip" style="margin-top:12px">
    <div id="system-status" class="status warn" style="margin:0">系統尚未同步主檔</div>
    <div class="advanced-row">
      <button id="btn-sync" class="ghost" type="button">同步主檔</button>
      <button id="btn-cameras" class="ghost" type="button">檢查相機</button>
    </div>
    <div id="camera-diagnostic" class="diagnostic">尚未檢查相機。</div>
  </div>
</section>

<section id="page-proposal" class="page">
  <section class="panel camera-panel compact">
    <h2>相機輸入</h2>
    <div class="button-row">
      <button id="btn-start" type="button">啟動相機</button>
      <button id="btn-stop" type="button" class="secondary" disabled>停止相機</button>
    </div>
    <div id="reader-wrap" class="reader-wrap"><div id="reader"></div></div>
    <div class="scanner-result">
      <div class="muted">掃描狀態</div>
      <div id="scanner-status" class="status warn">相機尚未啟動</div>
    </div>
  </section>

  <section class="panel">
    <h2>提案基本資料</h2>
    <label>提案標題（選填）<input id="proposal-title" placeholder="例：門市補貨 / 採購需求，可留空"></label>
    <p class="muted">未填標題時，送出後將以系統單號追蹤。</p>
    <label>提案來源<input id="proposal-source" value="GitHub Pages"></label>
  </section>

  <section class="panel">
    <h2>手動加入</h2>
    <div class="row">
      <label>條碼 / 品名 / 品項ID<input id="manual-query" type="search" placeholder="輸入條碼或品名關鍵字"></label>
      <label>數量<input id="manual-qty" type="number" min="1" value="1"></label>
      <button id="btn-add" type="button">查詢 / 加入</button>
    </div>
    <div class="muted" style="margin-top:10px">手動狀態</div>
    <p id="manual-status" class="status"></p>
  </section>

  <section class="panel">
    <div style="display:flex;justify-content:space-between;gap:10px;align-items:center"><h2 style="margin:0">草稿品項</h2><span id="total-badge" class="badge">品項 0｜總數 0</span></div>
    <p id="submit-hint" class="muted">送出後將以系統單號追蹤。</p>
    <div id="draft-list"></div>
    <div class="button-row"><button id="btn-submit" type="button">送出提案</button><button id="btn-clear" type="button" class="secondary">清空草稿</button></div>
    <p id="submit-status" class="status"></p>
  </section>
</section>

<section id="page-history" class="page hidden">
  <section class="panel">
    <h2>歷史單據查詢</h2>
    <p class="muted">後端以日期字串查 createdAt；本頁固定送出 YYYY-MM-DD。</p>
    <div class="search-row">
      <label>單據日期<input id="history-date" type="date"></label>
      <button id="btn-history-search" type="button">查詢此日期</button>
      <button id="btn-history-today" type="button" class="ghost">今日單據</button>
    </div>
    <p id="history-message" class="status"></p>
    <div id="history-results"></div>
  </section>
</section>
</main>

<div id="picker" class="modal-backdrop hidden"><section class="modal-panel"><div class="modal-header"><div><h2 style="margin:0">選擇商品</h2><p class="muted" style="margin:4px 0 0">找到多筆，請點選一筆加入草稿。</p></div><button id="btn-close-picker" type="button" class="ghost">關閉</button></div><div id="choice-list"></div></section></div>
<div id="detail-modal" class="modal-backdrop hidden"><section class="modal-panel"><div class="modal-header"><div><h2 id="detail-doc-id" style="margin:0">單據明細</h2><p id="detail-summary" class="muted" style="margin:4px 0 0"></p></div><button id="btn-close-detail" type="button" class="ghost">關閉</button></div><div id="detail-items"></div></section></div>
<script src="app.js?v=20260517-ui-layout-v6"></script>
</body></html>
